# ────────────────────────────────────────────
#  行业日报 · 主题配置
#  想加新行业？复制一段配置即可！
# ────────────────────────────────────────────
# 每个主题包含：
#   enabled      — true/false，关闭则不推送
#   title_prefix — 日报标题前缀（支持 emoji）
#   sections     — 板块列表：[名称, 副标题]
#   google_queries — Google News 搜索词列表
#   rss_feeds    — 额外的 RSS 源（可选）
#   twitter      — 是否抓取推特 AI 圈（仅科技类建议开）
#   footer       — 日报底部署名
#   news_count   — 精选条数（建议 10~14）
#
# 保存后重启 GitHub Actions 即可生效
# ────────────────────────────────────────────

topics:
  # ── 美妆行业 ──
  beauty:
    enabled: true
    title_prefix: "💄 美妆行业日报"
    sections:
      - ["🏷️ 品牌动态", "新品发布、业绩财报、品牌合作"]
      - ["🤝 投融资·并购", "融资、收购、上市"]
      - ["📊 行业事件", "市场趋势、政策新规、渠道变化"]
      - ["🔍 产品·成分", "新品技术、热门成分、研发动态"]
    google_queries:
      # 国际大牌
      - "欧莱雅 雅诗兰黛 资生堂 最新动态"
      - "LVMH 美妆 品牌 Dior 娇兰 纪梵希 最新"
      - "宝洁 联合利华 美容 护肤 品牌 动态"
      - "Coty 拜尔斯道夫 妮维雅 La Prairie 最新"
      # 国货品牌
      - "珀莱雅 薇诺娜 华熙生物 新品 业绩"
      - "完美日记 花西子 毛戈平 最新动态"
      - "韩束 丸美 自然堂 谷雨 溪木源 品牌"
      - "巨子生物 可复美 瑷尔博士 最新"
      # 韩妆日妆
      - "爱茉莉太平洋 雪花秀 LG生活健康 最新"
      - "高丝 花王 芳珂 Fancl 美妆 品牌"
      # 行业综合
      - "美妆 品牌 融资 收购 上市"
      - "化妆品 护肤 新品 发布 成分"
      - "化妆品行业 市场 趋势 新规"
      # 美妆垂类媒体（公众号/行业媒体覆盖）
      - "聚美丽 美妆 最新"
      - "青眼 美妆 最新"
      - "化妆品观察 品观 最新"
      - "化妆品财经在线 CBO 最新"
      - "LADYMAX 美妆 最新"
      - "美妆内行人 最新"
      - "华妆志 美妆 最新"
      - "化妆品报 美妆 最新"
      - "KEV美妆圈 最新"
      - "C2CC新传媒 美妆 最新"
      - "美博会 美妆 最新"
      - "everybody关注 美妆"
      - "美妆护肤 行业 市场动态"
      - "化妆品 国货品牌 最新动态"
      - "美妆行业 政策法规"
    rss_feeds: []
    twitter: false
    footer: "💡 来源：Google News品牌搜索 | 每日10:30自动推送"
    news_count: 14
    # 分类规则：按优先级匹配，第一个命中即停
    categorize_rules:
      - section: "🤝 投融资·并购"
        priority: 1
        exact: ["融资", "A轮", "B轮", "C轮", "D轮", "收购", "并购", "IPO", "递表", "港交所", "纽交所", "纳斯达克", "深交所", "上交所", "北交所", "pre-IPO", "Pre-A", "天使轮", "战略投资", "股权投资", "投资方", "融资金额", "美元融资", "亿元融资"]
        context: [["上市", ["港交所", "IPO", "招股书", "递表", "纳斯达克", "纽交所", "A股", "科创板"]]]
      - section: "🔍 产品·成分"
        priority: 2
        match: ["玻尿酸", "烟酰胺", "胜肽", "视黄醇", "维A", "维C", "维E", "蓝铜肽", "二裂酵母", "神经酰胺", "水杨酸", "果酸", "壬二酸", "传明酸", "虾青素", "白藜芦醇", "艾地苯", "麦角硫因", "依克多因", "补骨脂酚", "配方", "原料", "SPF", "PA+++", "防晒指数", "洁面", "安瓶", "冻干粉", "次抛", "重组胶原", "类人胶原", "生物发酵", "微生态", "皮肤微生态", "原料桶", "纯净美妆", "Clean Beauty", "无添加", "零残忍", "纯素美妆"]
      - section: "🏷️ 品牌动态"
        priority: 3
        match: ["新品", "发布", "财报", "业绩", "营收", "增长", "下滑", "关店", "开店", "合作", "联名", "代言", "官宣", "任命", "换届", "重组", "升级", "焕新", "换logo", "品牌升级", "线下", "直播", "双十一", "618", "直播间", "自有品牌", "白牌", "平价", "国货", "专研", "实验室"]
        exclude: ["新规", "法规", "监管", "行业报告", "市场规模", "份额报告"]
        exclude_to: "📊 行业事件"
      - section: "📊 行业事件"
        priority: 4
        match: []  # fallback

  # ── AI·科技行业 ──
  tech:
    enabled: true
    title_prefix: "🤖 AI·3C·科技日报"
    sections:
      - ["📊 行业动态", "市场数据、行业趋势、投融资"]
      - ["🏭 公司事件", "产品发布、企业动态、合作并购"]
      - ["🔍 技术趋势", "AI突破、芯片进展、前沿技术"]
    google_queries:
      # AI 核心
      - "AI 人工智能 最新进展"
      - "大模型 LLM GPT 发布"
      - "AI Agent 智能体 应用"
      - "具身智能 机器人 最新"
      - "AI 开源模型 最新"
      - "AI 芯片 算力 最新"
      # 行业
      - "手机 新品 发布"
      - "芯片 半导体 最新"
      - "人工智能 投融资 融资"
      - "AI 生成式 应用 落地"
      - "科技公司 AI 战略"
    rss_feeds:
      - "https://www.ithome.com/rss/"
      - "https://36kr.com/feed"
      - "https://www.jiqizhixin.com/rss"
      - "https://www.qbitai.com/rss"
    twitter: true
    footer: "💡 来源：Google News + IT之家/36氪/机器之心/量子位 + 推特AI圈 | 每日10:30自动推送"
    news_count: 10
    # 分类规则：按优先级匹配
    categorize_rules:
      - section: "🏭 公司事件"
        priority: 1
        exact: ["融资", "A轮", "B轮", "C轮", "D轮", "收购", "并购", "IPO", "递表", "上市", "港交所", "财报", "业绩", "营收", "裁员", "重组", "拆分", "交割", "投资方", "融资金额"]
        context: [["上市", ["港交所", "IPO", "招股书", "递表", "纳斯达克"]]]
      - section: "🔍 技术趋势"
        priority: 2
        match: ["大模型", "LLM", "GPT", "Claude", "Gemini", "开源模型", "模型", "Agent", "智能体", "机器人", "具身智能", "芯片", "半导体", "制程", "工艺", "量产", "算力", "GPU", "TPU", "NPU", "量子", "算法", "推理", "训练", "预训练", "微调", "RLHF", "RAG", "embedding", "Token", "参数", "benchmark", "评测", "超越", "首次", "突破"]
      - section: "📊 行业动态"
        priority: 3
        match: []  # fallback

