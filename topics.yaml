# ────────────────────────────────────────────
#  行业日报 · 主题配置
#  想加新行业？复制一段配置即可！
# ────────────────────────────────────────────
# 每个主题包含：
#   enabled      — true/false，关闭则不推送
#   title_prefix — 日报标题前缀（支持 emoji）
#   sections     — 板块列表：[名称, 副标题]
#   google_queries — Google News 搜索词列表
#   rss_feeds    — 额外的 RSS 源（可选）
#   twitter      — 是否抓取推特 AI 圈（仅科技类建议开）
#   footer       — 日报底部署名
#   news_count   — 精选条数（建议 10~14）
#
# 保存后重启 GitHub Actions 即可生效
# ────────────────────────────────────────────

topics:
  # ── 美妆行业 ──
  beauty:
    enabled: true
    title_prefix: "💄 美妆行业日报"
    sections:
      - ["🏷️ 品牌动态", "新品发布、业绩财报、品牌合作"]
      - ["🤝 投融资·并购", "融资、收购、上市"]
      - ["📊 行业事件", "市场趋势、政策新规、渠道变化"]
      - ["🔍 产品·成分", "新品技术、热门成分、研发动态"]
    google_queries:
      # 国际大牌
      - "欧莱雅 雅诗兰黛 资生堂 最新动态 2026"
      - "LVMH 美妆 品牌 Dior 娇兰 纪梵希 最新"
      - "宝洁 联合利华 美容 护肤 品牌 动态"
      - "Coty 拜尔斯道夫 妮维雅 La Prairie 最新"
      # 国货品牌
      - "珀莱雅 薇诺娜 华熙生物 新品 业绩"
      - "完美日记 花西子 毛戈平 最新动态 2026"
      - "韩束 丸美 自然堂 谷雨 溪木源 品牌"
      - "巨子生物 可复美 瑷尔博士 最新"
      # 韩妆日妆
      - "爱茉莉太平洋 雪花秀 LG生活健康 最新"
      - "高丝 花王 芳珂 Fancl 美妆 品牌"
      # 行业综合
      - "美妆 品牌 融资 收购 上市 2026"
      - "化妆品 护肤 新品 发布 成分"
      - "化妆品行业 市场 趋势 新规 2026"
    rss_feeds: []
    twitter: false
    footer: "💡 来源：Google News品牌搜索 | 每日9:00自动推送"
    news_count: 14

  # ── AI·科技行业 ──
  tech:
    enabled: true
    title_prefix: "🤖 AI·3C·科技日报"
    sections:
      - ["📊 行业动态", "市场数据、行业趋势、投融资"]
      - ["🏭 公司事件", "产品发布、企业动态、合作并购"]
      - ["🔍 技术趋势", "AI突破、芯片进展、前沿技术"]
    google_queries:
      # AI 核心
      - "AI 人工智能 最新进展 2026"
      - "大模型 LLM GPT 发布"
      - "AI Agent 智能体 应用"
      - "具身智能 机器人 最新"
      - "AI 开源模型 最新"
      - "AI 芯片 算力 最新"
      # 行业
      - "手机 新品 发布 2026"
      - "芯片 半导体 最新"
      - "人工智能 投融资 融资"
      - "AI 生成式 应用 落地"
      - "科技公司 AI 战略 2026"
    rss_feeds:
      - "https://www.ithome.com/rss/"
      - "https://36kr.com/feed"
      - "https://www.jiqizhixin.com/rss"
      - "https://www.qbitai.com/rss"
    twitter: true
    footer: "💡 来源：Google News + IT之家/36氪/机器之心/量子位 + 推特AI圈 | 每日9:00自动推送"
    news_count: 10

