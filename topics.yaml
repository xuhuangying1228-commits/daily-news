# ────────────────────────────────────────────
#  行业日报 · 主题配置
#  想加新行业？复制一段配置即可！
# ────────────────────────────────────────────
# 每个主题包含：
#   enabled      — true/false，关闭则不推送
#   title_prefix — 日报标题前缀（支持 emoji）
#   sections     — 板块列表：[名称, 副标题]
#   google_queries — Google News 搜索词列表
#   rss_feeds    — 额外的 RSS 源（可选）
#   twitter      — 是否抓取推特 AI 圈（仅科技类建议开）
#   footer       — 日报底部署名
#   news_count   — 精选条数（建议 10~14）
#
# 保存后重启 GitHub Actions 即可生效
# ────────────────────────────────────────────

topics:
  # ── 美妆行业 ──
  beauty:
    enabled: true
    title_prefix: "💄 美妆行业日报"
    sections:
      - ["🏷️ 品牌动态", "新品发布、业绩财报、品牌合作"]
      - ["🤝 投融资·并购", "融资、收购、上市"]
      - ["📊 行业事件", "市场趋势、政策新规、渠道变化"]
      - ["🔍 产品·成分", "新品技术、热门成分、研发动态"]
    google_queries:
      # 国际大牌
      - "欧莱雅 雅诗兰黛 资生堂 最新动态"
      - "LVMH 美妆 品牌 Dior 娇兰 纪梵希 最新"
      - "宝洁 联合利华 美容 护肤 品牌 动态"
      - "Coty 拜尔斯道夫 妮维雅 La Prairie 最新"
      # 国货品牌
      - "珀莱雅 薇诺娜 华熙生物 新品 业绩"
      - "完美日记 花西子 毛戈平 最新动态"
      - "韩束 丸美 自然堂 谷雨 溪木源 品牌"
      - "巨子生物 可复美 瑷尔博士 最新"
      # 韩妆日妆
      - "爱茉莉太平洋 雪花秀 LG生活健康 最新"
      - "高丝 花王 芳珂 Fancl 美妆 品牌"
      # 行业综合
      - "美妆 品牌 融资 收购 上市"
      - "化妆品 护肤 新品 发布 成分"
      - "化妆品行业 市场 趋势 新规"
      # 美妆垂类媒体（公众号/行业媒体覆盖）
      - "聚美丽 美妆 最新"
      - "青眼 美妆 最新"
      - "化妆品观察 品观 最新"
      - "化妆品财经在线 CBO 最新"
      - "LADYMAX 美妆 最新"
      - "美妆内行人 最新"
      - "华妆志 美妆 最新"
      - "化妆品报 美妆 最新"
      - "KEV美妆圈 最新"
      - "C2CC新传媒 美妆 最新"
      - "美博会 美妆 最新"
      - "everybody关注 美妆"
      - "美妆护肤 行业 市场动态"
      - "化妆品 国货品牌 最新动态"
      - "美妆行业 政策法规"
    rss_feeds: []
    twitter: false
    footer: "💡 来源：Google News品牌搜索 | 每日10:30自动推送"
    news_count: 14
    # 分类规则：按优先级匹配，第一个命中即停
    categorize_rules:
      - section: "🤝 投融资·并购"
        priority: 1
        exact: ["融资", "A轮", "B轮", "C轮", "D轮", "收购", "并购", "IPO", "递表", "港交所", "纽交所", "纳斯达克", "深交所", "上交所", "北交所", "pre-IPO", "Pre-A", "天使轮", "战略投资", "股权投资", "投资方", "融资金额", "美元融资", "亿元融资"]
        context: [["上市", ["港交所", "IPO", "招股书", "递表", "纳斯达克", "纽交所", "A股", "科创板"]]]
      - section: "🔍 产品·成分"
        priority: 2
        match: ["玻尿酸", "烟酰胺", "胜肽", "视黄醇", "维A", "维C", "维E", "蓝铜肽", "二裂酵母", "神经酰胺", "水杨酸", "果酸", "壬二酸", "传明酸", "虾青素", "白藜芦醇", "艾地苯", "麦角硫因", "依克多因", "补骨脂酚", "配方", "原料", "SPF", "PA+++", "防晒指数", "洁面", "安瓶", "冻干粉", "次抛", "重组胶原", "类人胶原", "生物发酵", "微生态", "皮肤微生态", "原料桶", "纯净美妆", "Clean Beauty", "无添加", "零残忍", "纯素美妆"]
      - section: "🏷️ 品牌动态"
        priority: 3
        match: ["新品", "发布", "财报", "业绩", "营收", "增长", "下滑", "关店", "开店", "合作", "联名", "代言", "官宣", "任命", "换届", "重组", "升级", "焕新", "换logo", "品牌升级", "线下", "直播", "双十一", "618", "直播间", "自有品牌", "白牌", "平价", "国货", "专研", "实验室"]
        exclude: ["新规", "法规", "监管", "行业报告", "市场规模", "份额报告"]
        exclude_to: "📊 行业事件"
      - section: "📊 行业事件"
        priority: 4
        match: []  # fallback

  # ── AI简报 ──
  tech:
    enabled: true
    title_prefix: "🤖 AI日报"
    sections:
      - ["🔥 AI产品动态", "ChatGPT/Claude/Codex/Gemini等AI产品更新与发布"]
      - ["📖 攻略·教程", "AI智能体使用攻略、实操教程、技巧分享"]
      - ["⚡ 行业趋势", "AI投融资、大模型突破、行业格局变化"]
    google_queries:
      # AI 产品与工具
      - "ChatGPT 最新 更新 功能"
      - "Claude Code 使用 教程 最新"
      - "Codex OpenAI 使用 攻略"
      - "AI Agent 智能体 教程 应用"
      - "Gemini Google AI 最新"
      - "Cursor Windsurf AI编程 最新"
      - "AI 编程工具 最新 动态"
      - "大模型 LLM GPT 发布"
      - "AI 开源模型 最新"
      - "AI 投融资 融资 最新"
      - "AI 生成式 应用 落地"
      - "具身智能 机器人 最新"
      # AI 垂类媒体（公众号/行业媒体覆盖）
      - "机器之心 AI 最新"
      - "量子位 AI 最新"
      - "新智元 AI 最新"
      - "AI前线 最新"
      - "极客公园 AI 最新"
      - "AIGC开放社区 最新"
      - "AI工具集 攻略 教程"
      - "ChatGPT中文 攻略 最新"
      - "程序员鱼皮 AI 工具"
      - "PaperWeekly AI 最新"
      - "深度学习 NLP 最新"
    rss_feeds:
      - "https://www.jiqizhixin.com/rss"
      - "https://www.qbitai.com/rss"
    twitter: true
    footer: "💡 来源：Google News + 机器之心/量子位RSS + 11个公众号 + 推特AI圈 | 每日10:30自动推送"
    news_count: 12
    # 分类规则：按优先级匹配
    categorize_rules:
      - section: "📖 攻略·教程"
        priority: 1
        match: ["教程", "攻略", "指南", "使用技巧", "实操", "上手", "入门", "配置", "部署", "如何使用", "怎么用", "玩法", "提示词", "Prompt", "prompt", "技巧", "快捷键", "最佳实践", "保姆级", "一文读懂", "一文看懂", "手把手", "详解", "深入浅出", "从零开始", "新手", "小白", "工作流", "Workflow", "MCP", "插件", "集成", "接入", "接入教程"]
        context: [["Code", ["Claude", "ChatGPT", "Codex", "Cursor", "Agent"]]]
      - section: "🔥 AI产品动态"
        priority: 2
        match: ["ChatGPT", "GPT", "Claude", "Codex", "Gemini", "Sora", "OpenAI", "Anthropic", "DeepSeek", "Cursor", "Windsurf", "Agent", "智能体", "发布", "更新", "升级", "上线", "新功能", "官宣", "推出", "重磅", "发布", "模型", "大模型", "LLM", "开源", "开源模型", "参数", "benchmark", "评测", "超越"]
        exclude: ["融资", "收购", "并购", "IPO", "投融资"]
        exclude_to: "⚡ 行业趋势"
      - section: "⚡ 行业趋势"
        priority: 3
        match: []  # fallback

